<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>PharmaForest Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">  
  <link href="style.css" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

<div class="layout">
  <!-- 左：ロゴリスト（縦スクロール） -->
  <aside class="left">
    <div class="carousel" id="carousel" x-data="{ entries: navEntries }">
      <template x-for="entry in entries" :key="entry.key">
        <div class="logo" :data-key="entry.key">
          <img :src="entry.img" :alt="entry.title">
          <div class="meta">
            <div class="title" x-text="entry.title"></div>
            <div class="hint" x-text="entry.hint || ''"></div>
          </div>
        </div>
      </template>
    </div>
  </aside>

  <!-- 右：説明パネル -->
  <main class="right" id="rightPanel">
  </main>
</div>
<script src="repositories.js"></script>
<script src="data.js"></script>
<script>
  document.addEventListener('alpine:initialized', () => {
    const script = document.createElement('script');
    script.src = 'script.js';
    document.body.appendChild(script);
  }, { once: true });
</script>

</body>
</html>
